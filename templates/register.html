{% extends "base.html" %}
{% block title %}Register - AyurVeda{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width:520px">
    <div class="auth-logo">🌿</div>
    <h1>Create Your Profile</h1>
    <p class="auth-sub">Begin your Ayurvedic wellness journey</p>
    <div id="errorMsg" class="error-msg" style="display:none"></div>
    <form id="registerForm">
      <div class="form-row">
        <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="Your name" required/></div>
        <div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="you@example.com" required/></div>
      </div>
      <div class="form-group"><label>Password *</label><input type="password" id="password" placeholder="Create a password" required/></div>
      <div class="form-row">
        <div class="form-group"><label>Age</label><input type="number" id="age" placeholder="Your age" min="1" max="120"/></div>
        <div class="form-group"><label>Gender</label>
          <select id="gender"><option value="">Select...</option><option>Male</option><option>Female</option><option>Other</option><option>Prefer not to say</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Height (cm)</label><input type="number" id="height" placeholder="e.g. 170"/></div>
        <div class="form-group"><label>Weight (kg)</label><input type="number" id="weight" placeholder="e.g. 65"/></div>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="submitBtn">Create Account</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errorMsg');
  btn.textContent = 'Creating account...'; btn.disabled = true; err.style.display = 'none';
  try {
    const res = await fetch('/api/auth/register', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({
      name: document.getElementById('name').value,
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
      age: document.getElementById('age').value || null,
      gender: document.getElementById('gender').value || null,
      height: document.getElementById('height').value || null,
      weight: document.getElementById('weight').value || null
    })});
    const data = await res.json();
    if (res.ok) { window.location.href = '/dashboard'; }
    else { err.textContent = data.error; err.style.display = 'block'; }
  } catch(e) { err.textContent = 'Connection error. Please try again.'; err.style.display = 'block'; }
  btn.textContent = 'Create Account'; btn.disabled = false;
});
</script>
{% endblock %}
